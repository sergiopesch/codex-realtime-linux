name: CI

on:
  pull_request:
  push:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Automated gates
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      CI: true

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Show browser version
        run: |
          if command -v google-chrome >/dev/null 2>&1; then
            google-chrome --version
          elif command -v chromium >/dev/null 2>&1; then
            chromium --version
          elif command -v chromium-browser >/dev/null 2>&1; then
            chromium-browser --version
          else
            echo "No Chromium-compatible browser found for smoke:renderer." >&2
            exit 1
          fi

      - name: Run automated verification
        run: npm run verify:ci

      # Desktop launch, live environment, manual media, and physical hardware
      # checks are intentionally excluded from headless CI. Run
      # `npm run release:check` on the target Linux desktop before release.
