<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Agent Preview</title>
    <style>
      * {
        box-sizing: border-box;
      }

      :root {
        color-scheme: dark;
        --ink: #f2f2f3;
        --muted: #8f9297;
        --line: rgba(255, 255, 255, 0.09);
        --blue: #86a8c8;
        --green: #b9d2c2;
      }

      html,
      body {
        min-height: 100%;
        margin: 0;
        background: #101010;
        color: var(--ink);
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      body {
        display: grid;
        align-items: start;
        justify-items: center;
        overflow: hidden;
        padding: 16px;
      }

      main {
        display: grid;
        gap: 12px;
        width: min(620px, 100%);
      }

      .voice-line {
        display: flex;
        align-items: center;
        gap: 12px;
      }

      .orb {
        display: grid;
        place-items: center;
        width: 40px;
        height: 40px;
        border-radius: 50%;
        background: linear-gradient(180deg, #fbfbfc, #cfd2d6);
        color: #101010;
        box-shadow: 0 18px 38px rgba(0, 0, 0, 0.3);
      }

      .orb::before {
        content: "";
        width: 13px;
        height: 19px;
        border: 2px solid currentColor;
        border-radius: 999px;
      }

      h1 {
        margin: 0;
        font-size: clamp(22px, 5vw, 34px);
        font-weight: 520;
        letter-spacing: 0;
        line-height: 1.05;
      }

      .agents {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 10px;
      }

      article {
        display: grid;
        gap: 9px;
        min-height: 96px;
        border: 1px solid var(--line);
        border-radius: 14px;
        padding: 12px;
        background:
          linear-gradient(180deg, rgba(255, 255, 255, 0.058), rgba(255, 255, 255, 0.02)),
          rgba(255, 255, 255, 0.032);
        backdrop-filter: blur(20px) saturate(118%);
      }

      article div {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
      }

      strong {
        overflow: hidden;
        font-size: 13px;
        font-weight: 520;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      span {
        color: var(--muted);
        font-size: 12px;
        line-height: 1.4;
      }

      i {
        flex: 0 0 auto;
        width: 7px;
        height: 7px;
        border-radius: 50%;
        background: var(--green);
        box-shadow: 0 0 14px rgba(185, 210, 194, 0.48);
      }

      .active i {
        background: var(--blue);
        box-shadow: 0 0 16px rgba(134, 168, 200, 0.7);
      }

      .bars {
        display: flex;
        align-items: end;
        gap: 4px;
        height: 20px;
      }

      .bars b {
        width: 4px;
        border-radius: 999px;
        background: rgba(242, 242, 243, 0.7);
        animation: pulse 1.1s ease-in-out infinite;
      }

      .bars b:nth-child(1) {
        height: 9px;
      }

      .bars b:nth-child(2) {
        height: 18px;
        animation-delay: 160ms;
      }

      .bars b:nth-child(3) {
        height: 13px;
        animation-delay: 320ms;
      }

      .bars b:nth-child(4) {
        height: 20px;
        animation-delay: 480ms;
      }

      .bars b:nth-child(5) {
        height: 10px;
        animation-delay: 640ms;
      }

      @keyframes pulse {
        0%,
        100% {
          opacity: 0.36;
          transform: scaleY(0.72);
        }
        50% {
          opacity: 1;
          transform: scaleY(1);
        }
      }

      @media (max-width: 560px) {
        body {
          padding: 14px;
        }

        .agents {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <section class="voice-line" aria-label="Voice session">
        <div class="orb" aria-hidden="true"></div>
        <h1>Voice routes. Agents build.</h1>
      </section>

      <section class="agents" aria-label="Agent work">
        <article class="active">
          <div>
            <strong>Voice router</strong>
            <i aria-hidden="true"></i>
          </div>
          <span>Conversation stays live while work is routed.</span>
          <div class="bars" aria-hidden="true"><b></b><b></b><b></b><b></b><b></b></div>
        </article>
        <article class="active">
          <div>
            <strong>Codex harness</strong>
            <i aria-hidden="true"></i>
          </div>
          <span>Reasoning, tools, shell, and turns surface as quiet state.</span>
          <div class="bars" aria-hidden="true"><b></b><b></b><b></b><b></b><b></b></div>
        </article>
        <article>
          <div>
            <strong>Preview</strong>
            <i aria-hidden="true"></i>
          </div>
          <span>HTML output stays visible inside the desktop app.</span>
          <div class="bars" aria-hidden="true"><b></b><b></b><b></b><b></b><b></b></div>
        </article>
      </section>
    </main>
  </body>
</html>
